name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/fluffy-enigma

jobs:
  # ---------------------------------------------------------------------------
  # Quality gate: install deps, build assets, lint, run tests.
  # Uploads the compiled assets + resolved composer.lock as downloadable artifacts.
  # ---------------------------------------------------------------------------
  quality:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_sqlite, sqlite3, gd, zip, bcmath, pcntl, fileinfo, dom, xml
          coverage: none

      - name: Install Composer dependencies
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build front-end assets
        run: |
          npm ci
          npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check code style (Pint)
        continue-on-error: true
        run: vendor/bin/pint --test

      - name: Run tests
        run: php artisan test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            composer.lock
            public/build
          if-no-files-found: warn
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Build the production image and push it to GHCR.
  # PRs build only (no push); pushes to master/tags publish.
  # ---------------------------------------------------------------------------
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=ref,event=pr

      - name: Compute app version
        id: ver
        run: echo "version=$(date -u +%Y.%m.%d)+${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "### Image published 🐘"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Deploy it:  \`./deploy/deploy.sh ${{ env.IMAGE }}:latest\`  (or \`make deploy\`)"
          } >> "$GITHUB_STEP_SUMMARY"
